<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEE Solver — by Arpit Agarwal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(','\\)'],['$','$']],
    displayMath: [['\\[','\\]'],['$$','$$']],
    processEscapes: true,
    tags: 'none'
  },
  options: { skipHtmlTags: ['script','noscript','style','textarea'] },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* DEFAULT DARK THEME */
:root{
  --or:#e8612a;--ord:#c9501f;
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --bg:#0a0a0a;--bg2:#141414;--bg3:#1f1f1f;
  --text:#f4f4f5;--text2:#a1a1aa;--text3:#71717a;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.05);
  --success-bg:rgba(74,222,128,0.1);--success-border:rgba(74,222,128,0.2);--success-text:#4ade80;
  --danger-bg:rgba(248,113,113,0.1);--danger-border:rgba(248,113,113,0.2);--danger-text:#f87171;
  --orl:rgba(232,97,42,0.1);
  --shadow: 0 4px 20px rgba(0,0,0,0.2);
}

/* LIGHT THEME OVERRIDES */
[data-theme="light"] {
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.05);
  --success-bg:rgba(22,163,74,0.1);--success-border:rgba(22,163,74,0.2);--success-text:#16a34a;
  --danger-bg:rgba(220,38,38,0.1);--danger-border:rgba(220,38,38,0.2);--danger-text:#dc2626;
  --orl:rgba(232,97,42,0.1);
  --shadow: 0 4px 20px rgba(0,0,0,0.05);
}

body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;transition:background 0.3s, color 0.3s;}
.wrap{max-width:780px;margin:0 auto;padding:2rem 1.25rem 4rem}

.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem}
.brand{display:flex;align-items:center;gap:14px}
.logo-sq{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg, var(--or), var(--ord));display:grid;place-items:center;flex-shrink:0;box-shadow: 0 4px 12px var(--orl);}
.logo-sq svg{width:24px;height:24px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.bname{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.bsub{font-size:12px;color:var(--text3);margin-top:2px;font-family:var(--mono)}

.top-actions {display:flex; align-items:center; gap: 15px;}
.arpit{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.3px; font-weight: 500;}
.theme-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:grid;place-items:center;padding:8px;border-radius:10px;transition:all 0.2s}
.theme-btn:hover{color:var(--or);border-color:var(--or); box-shadow: 0 0 10px var(--orl);}

.subj-row{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.sbt{padding:8px 22px;border-radius:24px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .2s; font-family: var(--font);}
.sbt:hover{border-color:var(--or);color:var(--or)}
.sbt.on{background:var(--or);color:white;border-color:var(--or); box-shadow: 0 4px 12px var(--orl);}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:1.75rem;margin-bottom:1.5rem;box-shadow:var(--shadow);transition: opacity 0.2s, background 0.3s, border-color 0.3s}
.card.disabled {opacity: 0.6; pointer-events: none;}

.mode-row{display:flex;gap:8px;margin-bottom:1.25rem}
.md{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:12px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .2s;font-family:var(--font)}
.md svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2}
.md:hover{border-color:var(--or);color:var(--or);}
.md.on{border-color:var(--or);color:var(--or);background:var(--orl)}

.input-wrapper { position: relative; width: 100%; }
textarea.qi{width:100%;min-height:120px;resize:none;font-size:16px;font-family:var(--font);font-weight:500;color:var(--text);background:var(--bg3);border:1px solid var(--border); border-radius: 16px; padding: 16px; outline:none;line-height:1.6; overflow-y:hidden; padding-bottom: 40px; transition: border-color 0.2s, box-shadow 0.2s;}
textarea.qi:focus { border-color: var(--or); box-shadow: 0 0 0 3px var(--orl); }
textarea.qi::placeholder{color:var(--text3);font-weight:400}

.mic-btn { position: absolute; bottom: 12px; right: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 50%; width: 36px; height: 36px; display: grid; place-items: center; cursor: pointer; color: var(--text2); transition: all 0.2s; }
.mic-btn:hover { color: var(--or); border-color: var(--or); }
.mic-btn.recording { background: rgba(248,113,113,0.15); color: var(--danger-text); border-color: var(--danger-text); animation: pulse 1.5s infinite; }
@keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(248,113,113,0.4);} 70% {box-shadow: 0 0 0 12px rgba(248,113,113,0);} 100% {box-shadow: 0 0 0 0 rgba(248,113,113,0);} }

.div{height:1px;background:var(--border2);margin:18px 0}
.foot-row{display:flex;align-items:center;justify-content:space-between} 
.shortcut-hint {font-size: 12px; color: var(--text3); font-family: var(--mono); opacity: 0.8; font-weight: 500;}
.shortcut-hint kbd { background: var(--bg3); padding: 3px 6px; border-radius: 4px; border: 1px solid var(--border); }
.sbtn{display:flex;align-items:center;gap:8px;padding:12px 32px;background:linear-gradient(135deg, var(--or), var(--ord));color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s; box-shadow: 0 4px 15px var(--orl);}
.sbtn:hover{transform:translateY(-2px); box-shadow: 0 6px 20px rgba(232,97,42,0.25);}
.sbtn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;transform:none; box-shadow:none;}
.sbtn svg{width:16px;height:16px;fill:white}

.upzone{border:2px dashed var(--border);background: var(--bg3);border-radius:16px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .2s; position: relative; overflow: hidden;}
.upzone:hover,.upzone.drag{border-color:var(--or);background:var(--orl)}
.upzone svg{width:36px;height:36px;stroke:var(--text3);fill:none;stroke-width:1.5;display:block;margin:0 auto 16px; transition: stroke 0.2s;}
.upzone:hover svg {stroke: var(--or);}
.upzone p{font-size:15px;font-weight:600;color:var(--text)}
.upzone span{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:8px;display:block}
.upzone input{display:none}

.compressing-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
[data-theme="light"] .compressing-overlay { background: rgba(255,255,255,0.8); }
.compressing-overlay.active { opacity: 1; pointer-events: auto; z-index: 10; }
.compressing-text { font-size: 13px; color: var(--or); font-weight: 600; margin-top: 12px; font-family: var(--mono); }

.pw{display:none; position: relative;}
.pw img{width:100%;max-height:300px;object-fit:contain;border-radius:16px;border:1px solid var(--border); background: var(--bg3);}
.subt{width:100%;min-height:50px;resize:none;font-size:14px;font-family:var(--font);border:1px solid var(--border);border-radius:12px;padding:12px 16px;background:var(--bg3);color:var(--text);outline:none;margin-top:12px; transition: border-color 0.2s, box-shadow 0.2s;}
.subt:focus {border-color: var(--or); box-shadow: 0 0 0 3px var(--orl);}
.rmv{position: absolute; top: 10px; right: 10px; display:inline-flex;align-items:center;gap:6px;font-size:12px; font-weight: 600; color: white; cursor:pointer;background:rgba(0,0,0,0.6); backdrop-filter: blur(4px); border:none; padding: 6px 12px; border-radius: 20px; font-family:var(--font); transition: background 0.2s;}
.rmv:hover{background:var(--danger-text);}

.sol-card{background:var(--bg2);border:1px solid var(--border);border-radius:24px;overflow:hidden;margin-bottom:2rem;box-shadow:var(--shadow);animation:up .4s cubic-bezier(0.16, 1, 0.3, 1); transition: background 0.3s, border-color 0.3s}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.sh{padding:18px 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; flex-wrap: wrap; gap: 12px; background: var(--bg3);}
.sh-l{display:flex;align-items:center;gap:10px}
.sh-title{font-size:16px;font-weight:700;color:var(--text)}
.pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700; font-family: var(--mono);}
.pill.g{background:var(--success-bg);color:var(--success-text); border: 1px solid var(--success-border);}
.pill.o{background:var(--orl);color:var(--or); border: 1px solid rgba(232,97,42,0.2);}
.sh-r{display:flex;gap:8px; flex-wrap: wrap;}
.ab{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:10px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;background:var(--bg2);transition:all .2s;font-family:var(--font)}
.ab svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.ab:hover{border-color:var(--or);color:var(--or); transform: translateY(-1px);}
.ab.ok{color:var(--success-text);border-color:var(--success-text)}

.dots{display:flex;align-items:center;justify-content: center;gap:8px;padding:3rem 2rem}
.dot{width:10px;height:10px;border-radius:50%;background:var(--or);animation:pp 1.4s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pp{0%,80%,100%{opacity:.2;transform:scale(.6)}40%{opacity:1;transform:scale(1)}}

/* Text Layout Fixes */
.sb{padding:2rem;font-size:15px;line-height:1.8;color:var(--text); overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; -webkit-hyphens: auto; hyphens: auto;}
.sb p{margin-bottom:14px}

.concept-line{background:linear-gradient(to right, var(--orl), transparent);border-left:4px solid var(--or);padding:14px 18px;border-radius:0 12px 12px 0;margin-bottom:1.5rem;font-size:14px;color:var(--text); display: flex; gap: 12px; align-items: flex-start;}
.concept-line svg {width: 20px; height: 20px; flex-shrink: 0; fill: var(--or); margin-top: 2px;}
.concept-line div {flex: 1;}
.concept-line strong{color:var(--or);font-weight:700; letter-spacing: 0.3px;}

.step-row{display:flex;gap:16px;margin:16px 0;align-items:flex-start;line-height:1.7; background: var(--bg3); padding: 16px 20px; border-radius: 16px; border: 1px solid var(--border); transition: border-color 0.2s;}
.step-row:hover {border-color: rgba(255,255,255,0.2);}
[data-theme="light"] .step-row:hover {border-color: rgba(0,0,0,0.2);}
.step-num{background:var(--or);color:white;font-weight:700;font-family:var(--mono);font-size:13px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0; box-shadow: 0 2px 8px var(--orl);}
.step-content{flex:1;color:var(--text)}

.options-grid {display: grid; gap: 10px; margin: 16px 0;}
.option-row{display:flex;gap:12px;align-items:center;padding:12px 16px;border-radius:12px;background:var(--bg3);border:1px solid var(--border); transition: transform 0.2s;}
.option-correct{background:var(--success-bg);border-color:var(--success-border);}
.option-wrong{background:var(--danger-bg);border-color:var(--danger-border); opacity: 0.7;}
.opt-label{font-weight:700;font-family:var(--mono);font-size:14px;min-width:30px;flex-shrink:0; text-align: center;}
.opt-correct .opt-label{color:var(--success-text)}
.opt-wrong .opt-label{color:var(--danger-text)}
.opt-mark{font-size:16px;min-width:20px;flex-shrink:0; text-align: center; display: flex; align-items: center;}
.opt-text{flex:1;font-size:14px;color:var(--text)}

.ans-box{background:linear-gradient(135deg, var(--orl) 0%, transparent 100%);border:1px solid var(--border); border-left: 4px solid var(--or); border-radius:16px;padding:20px 24px;margin-top:2rem;display:flex;align-items:center;gap:16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);}
.ans-icon{background: var(--or); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 10px var(--orl);}
.ans-icon svg {width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;}
.ans-content {flex: 1;}
.ans-label {font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--or); font-weight: 700; margin-bottom: 4px;}
.ans-text{font-weight:700;font-size:16px;color:var(--text);font-family:var(--mono)}

.sb h3{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:24px 0 12px; font-family: var(--mono);}
.sb code{font-family:var(--mono);font-size:13px;background:var(--bg2); border: 1px solid var(--border); padding:3px 6px;border-radius:6px; color: var(--or);}
.sb pre{background:var(--bg2); border: 1px solid var(--border); padding:16px;border-radius:12px;overflow-x:auto;margin:16px 0;font-size:14px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);}
.mjx-chtml{overflow-x:auto}
.display-math{text-align:center;margin:16px 0; max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding:12px 0; background: var(--bg3); border-radius: 12px; border: 1px solid var(--border2); box-sizing: border-box;}

mjx-container[display="true"] { max-width: 100%; overflow-x: auto !important; overflow-y: hidden; }
mjx-math { white-space: normal; }

.hist-wrap{margin-top:2rem}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.hl{font-size:12px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:1px; font-weight: 600;}
.hc{font-size:12px;font-family:var(--mono);color:var(--text3);background:var(--bg2);border:1px solid var(--border); border-radius: 6px; cursor:pointer;padding:4px 10px; transition: all 0.2s;}
.hc:hover{color:var(--danger-text); border-color: var(--danger-text);}
.hi-list{display:flex;flex-direction:column;gap:8px}
.hi{padding:14px 18px;background:var(--bg2);border-radius:16px;cursor:pointer;border:1px solid var(--border);transition:all .2s; box-shadow: var(--shadow);}
.hi:hover{border-color:var(--or); transform: translateX(4px);}
.hi-q{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-m{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:6px}

.err{padding:14px 20px;background:var(--danger-bg);color:var(--danger-text); border: 1px solid var(--danger-border); border-left: 4px solid var(--danger-text); border-radius:12px;font-size:14px;margin-bottom:1.5rem;font-weight:600;display:none}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:12px 24px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:all .3s cubic-bezier(0.16, 1, 0.3, 1);pointer-events:none;z-index:999;font-family:var(--font);white-space:nowrap; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* PREMIUM PDF EXPORT STYLES (Forces clean white document) */
.pdf-export-mode {
  background: white !important;
  color: black !important;
  border: none !important;
  box-shadow: none !important;
  border-radius: 0 !important;
  margin: 0 !important;
}
.pdf-export-mode * {
  color: black !important;
}
.pdf-export-mode .sh-r { display: none !important; }
.pdf-export-mode .sh { background: transparent !important; border-bottom: 2px solid #eaeaea !important; }
.pdf-export-mode .step-row, .pdf-export-mode .ans-box, .pdf-export-mode .display-math, .pdf-export-mode .option-row { 
  background: transparent !important; 
  border: 1px solid #ddd !important; 
}
.pdf-export-mode .concept-line { border-left-color: black !important; }
.pdf-export-mode .concept-line svg { fill: black !important; }
.pdf-export-mode .step-num { background: black !important; color: white !important; }
.pdf-export-mode .ans-icon { background: black !important; color: white !important; }

/* Mobile Adjustments */
@media (max-width: 600px) {
  .wrap { padding: 1rem 0.8rem 3rem; }
  .card, .sol-card { border-radius: 16px; padding: 1.25rem; }
  .sb { padding: 1.25rem; font-size: 14px; }
  .sh { padding: 1rem 1.25rem; flex-direction: column; align-items: flex-start; }
  .sh-r { margin-top: 10px; width: 100%; justify-content: flex-start; }
  .top { flex-direction: column; align-items: flex-start; gap: 12px; }
  .top-actions { width: 100%; justify-content: space-between; }
  .ans-box { flex-direction: column; align-items: flex-start; gap: 8px; padding: 16px; }
  .concept-line { flex-direction: column; gap: 4px; padding: 12px; }
  .step-row { gap: 10px; padding: 12px; }
  .option-row { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="logo-sq">
        <svg viewBox="0 0 24 24">
          <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
        </svg>
      </div>
      <div>
        <div class="bname">JEE Solver</div>
        <div class="bsub">Physics · Chemistry · Mathematics</div>
      </div>
    </div>
    
    <div class="top-actions">
      <button class="theme-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle Theme">
        <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <div class="arpit">by Arpit Agarwal</div>
    </div>
  </div>

  <div class="subj-row">
    <div class="sbt on" onclick="setSub(this,'All')">All</div>
    <div class="sbt" onclick="setSub(this,'Mathematics')">Maths</div>
    <div class="sbt" onclick="setSub(this,'Physics')">Physics</div>
    <div class="sbt" onclick="setSub(this,'Chemistry')">Chemistry</div>
  </div>

  <div class="card" id="main-card">
    <div class="mode-row">
      <button class="md on" id="m-text" onclick="setMode('text')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Type
      </button>
      <button class="md" id="m-image" onclick="setMode('image')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Image
      </button>
    </div>

    <div id="p-text">
      <div class="input-wrapper">
        <textarea class="qi" id="qinput" placeholder="Ask anything — integration, Newton's laws, organic chemistry..."></textarea>
        <button class="mic-btn" id="mic-btn" onclick="toggleSpeech()" title="Dictate question">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
            <line x1="12" y1="19" x2="12" y2="23"></line>
            <line x1="8" y1="23" x2="16" y2="23"></line>
          </svg>
        </button>
      </div>
    </div>

    <div id="p-image" style="display:none">
      <div class="upzone" id="upzone" onclick="document.getElementById('imgf').click()" ondragover="dov(event)" ondragleave="dlv(event)" ondrop="ddrop(event)">
        <input type="file" id="imgf" accept="image/*" onchange="hf(event)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>Click, drag, or <kbd>Ctrl+V</kbd> your question image</p>
        <span>JPG · PNG · WEBP (Auto-compressed)</span>

        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>

        <span class="pill o">JEE concise</span>

        <button class="ab" id="pdf-btn" onclick="downloadPDF()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Save PDF
        </button>
        <button class="ab" id="cpbtn" onclick="cpSol()">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>

<div class="toast" id="toast"></div>

<script>
const WH="https://arpit17062000.app.n8n.cloud/webhook/jee-solve";
let mode='text',subj='All',iB64=null,lastS='';
let hist = JSON.parse(localStorage.getItem('jee_history')) || [];

// 1. GLOBAL CTRL+V PASTE SUPPORT
document.addEventListener('paste', function(e) {
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (let index in items) {
    const item = items[index];
    if (item.kind === 'file' && item.type.includes('image/')) {
      const blob = item.getAsFile();
      setMode('image');
      pf(blob); 
      e.preventDefault();
      break;
    }
  }
});

// PREMIUM PDF EXPORT FUNCTION
function downloadPDF() {
  const btn = document.getElementById('pdf-btn');
  const originalHTML = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg> Generating...';
  btn.disabled = true;

  const element = document.getElementById('solcard');
  
  // Apply specific CSS class to force clean white background for printing
  element.classList.add('pdf-export-mode');

  // Format filename logic
  const fileNameTitle = subj === 'All' ? 'Problem' : subj;
  
  const opt = {
    margin:       [10, 10, 10, 10], // Top, Left, Bottom, Right
    filename:     `JEE_Solution_${fileNameTitle}.pdf`,
    image:        { type: 'jpeg', quality: 1.0 },
    html2canvas:  { scale: 2, useCORS: true, logging: false },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  // Generate and save
  html2pdf().set(opt).from(element).save().then(() => {
    // Restore UI
    element.classList.remove('pdf-export-mode');
    btn.innerHTML = originalHTML;
    btn.disabled = false;
    showToast('PDF Downloaded Successfully!');
  }).catch(err => {
    element.classList.remove('pdf-export-mode');
    btn.innerHTML = originalHTML;
    btn.disabled = false;
    showErr('Failed to generate PDF.');
  });
}

// SPEECH TO TEXT API
let recognition;
let isRecording = false;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  
  recognition.onresult = function(event) {
    let finalTranscript = '';
    for (let i = event.resultIndex; i < event.results.length; ++i) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript;
      }
    }
    if (finalTranscript) {
      const input = document.getElementById('qinput');
      input.value += (input.value.length > 0 ? ' ' : '') + finalTranscript;
      input.dispatchEvent(new Event('input')); 
    }
  };

  recognition.onend = function() {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
  };
} else {
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('mic-btn').style.display = 'none';
  });
}

function toggleSpeech() {
  if (!recognition) return;
  const btn = document.getElementById('mic-btn');
  if (isRecording) {
    recognition.stop();
  } else {
    recognition.start();
    isRecording = true;
    btn.classList.add('recording');
  }
}

// CLIENT-SIDE IMAGE COMPRESSION (Canvas)
function compressImage(file, callback) {
  document.getElementById('comp-overlay').classList.add('active');
  
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = event => {
    const img = new Image();
    img.src = event.target.result;
    img.onload = () => {
      const MAX_WIDTH = 1200;
      let width = img.width;
      let height = img.height;
      
      if (width > MAX_WIDTH) {
        height = Math.round((height * MAX_WIDTH) / width);
        width = MAX_WIDTH;
      }

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
      const base64Data = compressedDataUrl.split(',')[1];
      
      document.getElementById('comp-overlay').classList.remove('active');
      callback(base64Data, compressedDataUrl);
    };
  };
}

// THEME TOGGLE
function initTheme() {
  const savedTheme = localStorage.getItem('jee_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  updateThemeIcon(savedTheme);
}
function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('jee_theme', newTheme);
  updateThemeIcon(newTheme);
}
function updateThemeIcon(theme) {
  const icon = document.getElementById('theme-icon');
  if (theme === 'light') {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
  }
}

window.onload = function() {
  initTheme();
  rH();
  setupTextareas();
};

function setupTextareas() {
  const textareas = document.querySelectorAll('textarea');
  textareas.forEach(ta => {
    ta.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });
  });
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    if(!document.getElementById('sbtn').disabled) solve();
  }
});


function setSub(el,s){document.querySelectorAll('.sbt').forEach(t=>t.classList.remove('on'));el.classList.add('on');subj=s}
function setMode(m){
  mode=m;
  ['text','image'].forEach(x=>{
    document.getElementById('m-'+x).classList.toggle('on',x===m);
    document.getElementById('p-'+x).style.display=x===m?'block':'none';
  });
  if(m==='image'){
    document.getElementById('upzone').style.display=iB64?'none':'block';
    document.getElementById('pw').style.display=iB64?'block':'none';
    document.getElementById('shortcut-hint').style.display='none';
  } else {
    document.getElementById('shortcut-hint').style.display='inline';
  }
}
function dov(e){e.preventDefault();document.getElementById('upzone').classList.add('drag')}
function dlv(e){document.getElementById('upzone').classList.remove('drag')}
function ddrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)pf(f);document.getElementById('upzone').classList.remove('drag')}
function hf(e){const f=e.target.files[0];if(f)pf(f)}

function pf(f){
  compressImage(f, (base64, dataUrl) => {
    iB64 = base64;
    document.getElementById('pthumb').src = dataUrl;
    document.getElementById('upzone').style.display='none';
    document.getElementById('pw').style.display='block';
  });
}

function rmI(){
  iB64=null;
  document.getElementById('pthumb').src='';
  document.getElementById('pw').style.display='none';
  document.getElementById('upzone').style.display='block';
  document.getElementById('imgf').value='';
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function showErr(m){const e=document.getElementById('errd');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',5000)}

function renderSolution(raw) {
  const lines = raw.split('\n');
  let html = '';
  let stepCounter = 0;
  let inMathBlock = false;
  let mathBuffer = [];
  let inOptionsBlock = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();

    if (inMathBlock) {
      mathBuffer.push(lines[i]); 
      if (line === '$$' || line === '\\]' || line.endsWith('$$') || line.endsWith('\\]')) {
        html += `<div class="display-math">${mathBuffer.join('\n')}</div>`;
        inMathBlock = false; 
        mathBuffer = [];     
      }
      continue;
    }

    if (line.startsWith('$$') || line.startsWith('\\[')) {
      if ((line.startsWith('$$') && line.length > 2 && line.endsWith('$$')) || 
          (line.startsWith('\\[') && line.endsWith('\\]'))) {
        html += `<div class="display-math">${line}</div>`;
      } else {
        inMathBlock = true;
        mathBuffer.push(lines[i]);
      }
      continue;
    }

    if (!line) {
        if(inOptionsBlock) { html += `</div>`; inOptionsBlock = false; }
        continue;
    }

    if (line.startsWith('**Concept/Formula Used:**') || line.startsWith('**Concept:') || line.startsWith('Concept/Formula Used:')) {
      const content = line.replace(/\*\*Concept\/Formula Used:\*\*/, '').replace(/\*\*Concept:/, '').replace('Concept/Formula Used:', '').trim();
      html += `<div class="concept-line">
                 <svg viewBox="0 0 24 24"><path d="M9 18h6v2H9zM12 2a7 7 0 0 0-7 7c0 2.5 1.5 4.8 3.8 6h6.4C17.5 13.8 19 11.5 19 9a7 7 0 0 0-7-7z"/></svg>
                 <div><strong>Concept:</strong> ${renderInline(content)}</div>
               </div>`;
      continue;
    }

    if (line.match(/^\*\*Answer:/i) || line.match(/^Answer:/i)) {
      const content = line.replace(/\*\*Answer:\*\*/i, '').replace(/^Answer:/i, '').trim();
      html += `<div class="ans-box">
                 <div class="ans-icon"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></div>
                 <div class="ans-content">
                    <div class="ans-label">Final Answer</div>
                    <div class="ans-text">${renderInline(content)}</div>
                 </div>
               </div>`;
      continue;
    }

    const optMatch = line.match(/^\(([A-D])\)\s*(✓|✗|CORRECT|INCORRECT|correct|incorrect)\s*[—-]?\s*(.*)/);
    if (optMatch) {
      if (!inOptionsBlock) { html += `<div class="options-grid">`; inOptionsBlock = true; }
      const letter = optMatch[1];
      const isCorrect = optMatch[2] === '✓' || optMatch[2].toUpperCase() === 'CORRECT';
      const reason = optMatch[3];
      const cls = isCorrect ? 'option-correct' : 'option-wrong';
      const mark = isCorrect ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
      const markColor = isCorrect ? 'var(--success-text)' : 'var(--danger-text)';
      html += `<div class="option-row ${cls}">
        <span class="opt-label" style="color:${markColor}">(${letter})</span>
        <span class="opt-mark" style="color:${markColor}">${mark}</span>
        <span class="opt-text">${renderInline(reason)}</span>
      </div>`;
      continue;
    }

    if (inOptionsBlock && !optMatch) { html += `</div>`; inOptionsBlock = false; }

    const stepMatch = line.match(/^(\d+)\.\s+(.+)/);
    if (stepMatch) {
      stepCounter = parseInt(stepMatch[1]);
      html += `<div class="step-row">
        <span class="step-num">${stepCounter}</span>
        <span class="step-content">${renderInline(stepMatch[2])}</span>
      </div>`;
      continue;
    }

    if (line.startsWith('###') || line.startsWith('##')) {
      html += `<h3>${line.replace(/^#+\s*/, '')}</h3>`;
      continue;
    }

    if (line.startsWith('- ') || line.startsWith('• ')) {
      html += `<div class="step-row"><span class="step-num" style="background:var(--bg3); border:2px solid var(--or); width:14px; height:14px; margin-top:5px; margin-left:7px;"></span><span class="step-content">${renderInline(line.slice(2))}</span></div>`;
      continue;
    }

    html += `<p>${renderInline(line)}</p>`;
  }
  
  if (inOptionsBlock) html += `</div>`;
  if (inMathBlock && mathBuffer.length > 0) html += `<div class="display-math">${mathBuffer.join('\n')}</div>`;
  return html;
}

function renderInline(t){
  return t
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}

function addH(q){
  hist.unshift({q:q.length>65?q.slice(0,65)+'...':q,s:subj,t:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  if(hist.length>8)hist.pop();
  localStorage.setItem('jee_history', JSON.stringify(hist)); 
  rH();
}

function rH(){
  const w=document.getElementById('histwrap');
  if(!hist.length){w.style.display='none';return;}
  w.style.display='block';
  document.getElementById('histlist').innerHTML=hist.map((h,i)=>
    `<div class="hi" onclick="lH(${i})"><div class="hi-q">${h.q}</div><div class="hi-m">${h.s} · ${h.t}</div></div>`
  ).join('');
}

function lH(i){
  setMode('text');
  const input = document.getElementById('qinput');
  input.value=hist[i].q;
  input.dispatchEvent(new Event('input'));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clH(){
  hist=[];
  localStorage.removeItem('jee_history');
  rH();
}

function cpSol(){
  if(!lastS)return;
  navigator.clipboard.writeText(lastS).then(()=>{
    const b=document.getElementById('cpbtn');
    b.classList.add('ok');b.innerHTML='<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!';
    setTimeout(()=>{b.classList.remove('ok');b.innerHTML='<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy'},2000);
  });
}

async function solve(){
  const btn=document.getElementById('sbtn');
  const mainCard=document.getElementById('main-card');
  const card=document.getElementById('solcard');
  const body=document.getElementById('solbody');
  const dots=document.getElementById('ldots');
  let payload={subject:subj,input_type:mode},qt='';

  if(mode==='text'){
    qt=document.getElementById('qinput').value.trim();
    if(!qt){showErr('Please enter a question.');return;}
    payload.question=qt;
  } else {
    if(!iB64){showErr('Please upload or paste an image.');return;}
    qt=document.getElementById('iq').value.trim()||'Solve this problem';
    payload.question=qt;
    payload.image_base64=iB64;
  }

  btn.disabled=true;
  mainCard.classList.add('disabled');
  btn.innerHTML='Solving...';
  
  card.style.display='block';
  body.style.display='none';
  dots.style.display='flex';
  document.getElementById('spill').textContent=subj;
  document.getElementById('errd').style.display='none';

  try{
    const res=await fetch(WH,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.message||'Server error');
    lastS=data.solution||'';
    dots.style.display='none';
    body.innerHTML=renderSolution(lastS);
    body.style.display='block';
    addH(qt);
    
    if (navigator.vibrate) navigator.vibrate(50);
    
    if(window.MathJax){
      MathJax.typesetClear([body]);
      MathJax.typesetPromise([body]).catch(e=>console.log('MathJax:',e));
    }
    
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    
  } catch(e){
    dots.style.display='none';
    body.innerHTML='<p style="color:var(--danger-text); font-weight:600;"><svg viewBox="0 0 24 24" style="width:18px;height:18px;vertical-align:middle;margin-right:8px;stroke:currentColor;fill:none;stroke-width:2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>'+e.message+'</p>';
    body.style.display='block';
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  } finally {
    btn.disabled=false;
    mainCard.classList.remove('disabled');
    btn.innerHTML='Solve <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }
}
</script>
