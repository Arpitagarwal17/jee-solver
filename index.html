<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEE Solver — by Arpit Agarwal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(','\\)'],['$','$']],
    displayMath: [['\\[','\\]'],['$$','$$']],
    processEscapes: true,
    tags: 'none'
  },
  options: { skipHtmlTags: ['script','noscript','style','textarea'] },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --or:#e8612a;--ord:#c9501f;--orl:rgba(232,97,42,0.09);
  --font:'Syne',sans-serif;--mono:'DM Mono',monospace;
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#222222;
  --text:#f0f0f0;--text2:#a0a0a0;--text3:#555555;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);
  --success-bg:rgba(74,222,128,0.1);--success-text:#4ade80;
  --danger-bg:rgba(248,113,113,0.1);--danger-text:#f87171;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* HEADER */
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem}
.brand{display:flex;align-items:center;gap:12px}
.logo-sq{width:44px;height:44px;border-radius:12px;background:var(--or);display:grid;place-items:center;flex-shrink:0}
.logo-sq svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.bname{font-size:23px;font-weight:700;color:var(--text);letter-spacing:-0.6px}
.bsub{font-size:11px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.arpit{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.3px}

/* SUBJECT TABS */
.subj-row{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.sbt{padding:7px 20px;border-radius:20px;font-size:13px;font-weight:600;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.sbt:hover{border-color:var(--or);color:var(--or)}
.sbt.on{background:var(--or);color:white;border-color:var(--or)}

/* INPUT CARD */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:1.5rem;margin-bottom:1rem}
.mode-row{display:flex;gap:6px;margin-bottom:1.1rem}
.md{display:flex;align-items:center;gap:5px;padding:7px 16px;border-radius:10px;font-size:12px;font-weight:600;border:0.5px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .13s;font-family:var(--font)}
.md svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.md:hover,.md.on{border-color:var(--or);color:var(--or);background:var(--orl)}

textarea.qi{width:100%;min-height:100px;resize:none;font-size:15px;font-family:var(--font);font-weight:500;color:var(--text);background:transparent;border:none;outline:none;line-height:1.65}
textarea.qi::placeholder{color:var(--text3);font-weight:400}

.div{height:0.5px;background:var(--border2);margin:14px 0}
.foot-row{display:flex;align-items:center;justify-content:flex-end}
.sbtn{display:flex;align-items:center;gap:8px;padding:11px 28px;background:var(--or);color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s}
.sbtn:hover{background:var(--ord);transform:translateY(-1px)}
.sbtn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;transform:none}
.sbtn svg{width:15px;height:15px;fill:white}

/* UPLOAD */
.upzone{border:1.5px dashed var(--border);border-radius:14px;padding:2.5rem;text-align:center;cursor:pointer;transition:all .15s}
.upzone:hover,.upzone.drag{border-color:var(--or);background:var(--orl)}
.upzone svg{width:30px;height:30px;stroke:var(--text3);fill:none;stroke-width:1.5;display:block;margin:0 auto 12px}
.upzone p{font-size:14px;font-weight:600;color:var(--text2)}
.upzone span{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:5px;display:block}
.upzone input{display:none}
.pw{display:none}
.pw img{width:100%;max-height:260px;object-fit:contain;border-radius:12px;border:0.5px solid var(--border)}
.subt{width:100%;min-height:48px;resize:none;font-size:13px;font-family:var(--font);border:0.5px solid var(--border);border-radius:10px;padding:9px 12px;background:var(--bg3);color:var(--text);outline:none;margin-top:10px}
.rmv{display:inline-flex;align-items:center;gap:4px;margin-top:8px;font-size:12px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:var(--font)}
.rmv:hover{color:var(--danger-text)}

/* SOLUTION CARD */
.sol-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:1rem;animation:up .3s ease}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.sh{padding:14px 1.5rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sh-l{display:flex;align-items:center;gap:8px}
.sh-title{font-size:14px;font-weight:700;color:var(--text)}
.pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill.g{background:var(--success-bg);color:var(--success-text)}
.pill.o{background:var(--orl);color:var(--or)}
.sh-r{display:flex;gap:5px}
.ab{display:flex;align-items:center;gap:4px;padding:6px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;background:transparent;transition:all .13s;font-family:var(--font)}
.ab svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.ab:hover{border-color:var(--or);color:var(--or)}
.ab.ok{color:var(--success-text);border-color:var(--success-text)}

/* LOADING DOTS */
.dots{display:flex;align-items:center;gap:6px;padding:1.75rem 1.5rem}
.dot{width:7px;height:7px;border-radius:50%;background:var(--or);animation:pp 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pp{0%,80%,100%{opacity:.15;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* SOLUTION BODY */
.sb{padding:1.5rem;font-size:14px;line-height:1.9;color:var(--text)}

.concept-line{background:rgba(232,97,42,0.06);border-left:3px solid var(--or);padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:1.25rem;font-size:13px;color:var(--text2)}
.concept-line strong{color:var(--or);font-weight:600}

.step-row{display:flex;gap:10px;margin:8px 0;align-items:flex-start;line-height:1.75}
.step-num{color:var(--or);font-weight:700;font-family:var(--mono);font-size:13px;min-width:22px;flex-shrink:0;padding-top:1px}
.step-content{flex:1;color:var(--text)}

.option-row{display:flex;gap:10px;margin:7px 0;align-items:flex-start;padding:8px 12px;border-radius:8px;background:var(--bg3);border:0.5px solid var(--border)}
.option-correct{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.2)}
.option-wrong{background:rgba(248,113,113,0.04);border-color:rgba(248,113,113,0.1)}
.opt-label{font-weight:700;font-family:var(--mono);font-size:13px;min-width:28px;flex-shrink:0}
.opt-correct .opt-label{color:var(--success-text)}
.opt-wrong .opt-label{color:var(--danger-text)}
.opt-mark{font-size:12px;min-width:16px;flex-shrink:0}
.opt-text{flex:1;font-size:13px;color:var(--text2)}

.ans-box{background:var(--orl);border:0.5px solid rgba(232,97,42,0.3);border-radius:12px;padding:14px 18px;margin-top:1.25rem;display:flex;align-items:center;gap:10px}
.ans-arrow{color:var(--or);font-size:18px;font-weight:700;flex-shrink:0}
.ans-text{font-weight:700;font-size:15px;color:var(--text);font-family:var(--mono)}

.sb p{margin-bottom:10px}
.sb h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 6px}
.sb code{font-family:var(--mono);font-size:12px;background:var(--bg3);padding:2px 6px;border-radius:4px}
.sb pre{background:var(--bg3);padding:12px;border-radius:10px;overflow-x:auto;margin:10px 0;font-size:13px}
.mjx-chtml{overflow-x:auto}
.display-math{text-align:center;margin:12px 0;overflow-x:auto;padding:4px 0}

/* HISTORY */
.hist-wrap{margin-top:1.5rem}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hl{font-size:11px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.6px}
.hc{font-size:11px;font-family:var(--mono);color:var(--text3);background:none;border:none;cursor:pointer;padding:0}
.hc:hover{color:var(--danger-text)}
.hi-list{display:flex;flex-direction:column;gap:5px}
.hi{padding:11px 14px;background:var(--bg2);border-radius:12px;cursor:pointer;border:0.5px solid transparent;transition:all .13s}
.hi:hover{border-color:var(--border);background:var(--bg3)}
.hi-q{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-m{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px}

.err{padding:12px 16px;background:var(--danger-bg);color:var(--danger-text);border-radius:12px;font-size:13px;margin-bottom:1rem;font-weight:500;display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-family:var(--font);white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <div class="logo-sq">
        <svg viewBox="0 0 24 24">
          <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2v-4M9 21H5a2 2 0 0 1-2-2v-4m0 0h18"/>
        </svg>
      </div>
      <div>
        <div class="bname">JEE Solver</div>
        <div class="bsub">Physics · Chemistry · Mathematics</div>
      </div>
    </div>
    <div class="arpit">by Arpit Agarwal</div>
  </div>

  <div class="subj-row">
    <div class="sbt on" onclick="setSub(this,'All')">All</div>
    <div class="sbt" onclick="setSub(this,'Mathematics')">Maths</div>
    <div class="sbt" onclick="setSub(this,'Physics')">Physics</div>
    <div class="sbt" onclick="setSub(this,'Chemistry')">Chemistry</div>
  </div>

  <div class="card">
    <div class="mode-row">
      <button class="md on" id="m-text" onclick="setMode('text')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Type
      </button>
      <button class="md" id="m-image" onclick="setMode('image')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Image
      </button>
    </div>

    <div id="p-text">
      <textarea class="qi" id="qinput" placeholder="Ask anything — integration, Newton's laws, organic chemistry..."></textarea>
    </div>

    <div id="p-image" style="display:none">
      <div class="upzone" id="upzone" onclick="document.getElementById('imgf').click()" ondragover="dov(event)" ondragleave="dlv(event)" ondrop="ddrop(event)">
        <input type="file" id="imgf" accept="image/*" onchange="hf(event)">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <p>Click or drag your question image</p>
        <span>JPG · PNG · WEBP</span>
      </div>
      <div class="pw" id="pw">
        <img id="pthumb" src="" alt="question">
        <textarea class="subt" id="iq" placeholder="Specific question? (optional)"></textarea>
        <br>
        <button class="rmv" onclick="rmI()">
          <svg style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Remove
        </button>
      </div>
    </div>

    <div class="div"></div>
    <div class="foot-row">
      <button class="sbtn" id="sbtn" onclick="solve()">
        Solve
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <div class="err" id="errd"></div>

  <div class="sol-card" id="solcard" style="display:none">
    <div class="sh">
      <div class="sh-l">
        <span class="sh-title">Solution</span>
        <span class="pill g" id="spill">All</span>
        <span class="pill o">JEE concise</span>
      </div>
      <div class="sh-r">
        <button class="ab" id="cpbtn" onclick="cpSol()">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="ab" onclick="shSol()">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          Share
        </button>
      </div>
    </div>
    <div id="ldots" class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <div class="sb" id="solbody" style="display:none"></div>
  </div>

  <div class="hist-wrap" id="histwrap" style="display:none">
    <div class="ht">
      <span class="hl">// recent</span>
      <button class="hc" onclick="clH()">clear</button>
    </div>
    <div class="hi-list" id="histlist"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const WH="https://arpit17062000.app.n8n.cloud/webhook/jee-solve";
let mode='text',subj='All',iB64=null,hist=[],lastS='';

function setSub(el,s){document.querySelectorAll('.sbt').forEach(t=>t.classList.remove('on'));el.classList.add('on');subj=s}
function setMode(m){
  mode=m;
  ['text','image'].forEach(x=>{
    document.getElementById('m-'+x).classList.toggle('on',x===m);
    document.getElementById('p-'+x).style.display=x===m?'block':'none';
  });
  if(m==='image'){
    document.getElementById('upzone').style.display=iB64?'none':'block';
    document.getElementById('pw').style.display=iB64?'block':'none';
  }
}
function dov(e){e.preventDefault();document.getElementById('upzone').classList.add('drag')}
function dlv(e){document.getElementById('upzone').classList.remove('drag')}
function ddrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(f)pf(f);document.getElementById('upzone').classList.remove('drag')}
function hf(e){const f=e.target.files[0];if(f)pf(f)}
function pf(f){
  const r=new FileReader();
  r.onload=e=>{
    iB64=e.target.result.split(',')[1];
    document.getElementById('pthumb').src=e.target.result;
    document.getElementById('upzone').style.display='none';
    document.getElementById('pw').style.display='block';
  };
  r.readAsDataURL(f);
}
function rmI(){
  iB64=null;
  document.getElementById('pthumb').src='';
  document.getElementById('pw').style.display='none';
  document.getElementById('upzone').style.display='block';
  document.getElementById('imgf').value='';
}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function showErr(m){const e=document.getElementById('errd');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',5000)}

function renderSolution(raw){
  const lines=raw.split('\n');
  let html='';
  let stepCounter=0;

  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(!line)continue;

    // Concept line
    if(line.startsWith('**Concept/Formula Used:**')||line.startsWith('**Concept:')||line.startsWith('Concept/Formula Used:')){
      const content=line.replace(/\*\*Concept\/Formula Used:\*\*/,'').replace(/\*\*Concept:/,'').replace('Concept/Formula Used:','').trim();
      html+=`<div class="concept-line"><strong>Concept:</strong> ${content}</div>`;
      continue;
    }

    // Answer line
    if(line.match(/^\*\*Answer:/i)||line.match(/^Answer:/i)){
      const content=line.replace(/\*\*Answer:\*\*/i,'').replace(/^Answer:/i,'').trim();
      html+=`<div class="ans-box"><span class="ans-arrow">⟹</span><span class="ans-text">${content}</span></div>`;
      continue;
    }

    // Option lines (A) ✓ or (A) ✗
    const optMatch=line.match(/^\(([A-D])\)\s*(✓|✗|CORRECT|INCORRECT|correct|incorrect)\s*[—-]?\s*(.*)/);
    if(optMatch){
      const letter=optMatch[1];
      const isCorrect=optMatch[2]==='✓'||optMatch[2].toUpperCase()==='CORRECT';
      const reason=optMatch[3];
      const cls=isCorrect?'option-correct':'option-wrong';
      const mark=isCorrect?'✓':'✗';
      const markColor=isCorrect?'var(--success-text)':'var(--danger-text)';
      html+=`<div class="option-row ${cls}">
        <span class="opt-label" style="color:${markColor}">(${letter})</span>
        <span class="opt-mark" style="color:${markColor}">${mark}</span>
        <span class="opt-text">${renderInline(reason)}</span>
      </div>`;
      continue;
    }

    // Numbered steps — match "1." "2." etc
    const stepMatch=line.match(/^(\d+)\.\s+(.+)/);
    if(stepMatch){
      stepCounter++;
      html+=`<div class="step-row">
        <span class="step-num">${stepMatch[1]}.</span>
        <span class="step-content">${renderInline(stepMatch[2])}</span>
      </div>`;
      continue;
    }

    // Display math \[ ... \]
    if(line.startsWith('\\[')||line.startsWith('$$')){
      html+=`<div class="display-math">${line}</div>`;
      continue;
    }

    // Bold headings
    if(line.startsWith('###')||line.startsWith('##')){
      html+=`<h3>${line.replace(/^#+\s*/,'')}</h3>`;
      continue;
    }

    // Bullet points
    if(line.startsWith('- ')||line.startsWith('• ')){
      html+=`<div class="step-row"><span class="step-num">•</span><span class="step-content">${renderInline(line.slice(2))}</span></div>`;
      continue;
    }

    // Regular line
    html+=`<p>${renderInline(line)}</p>`;
  }
  return html;
}

function renderInline(t){
  return t
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>');
}

function addH(q){
  hist.unshift({q:q.length>65?q.slice(0,65)+'...':q,s:subj,t:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  if(hist.length>8)hist.pop();
  rH();
}
function rH(){
  const w=document.getElementById('histwrap');
  if(!hist.length){w.style.display='none';return;}
  w.style.display='block';
  document.getElementById('histlist').innerHTML=hist.map((h,i)=>
    `<div class="hi" onclick="lH(${i})"><div class="hi-q">${h.q}</div><div class="hi-m">${h.s} · ${h.t}</div></div>`
  ).join('');
}
function lH(i){setMode('text');document.getElementById('qinput').value=hist[i].q}
function clH(){hist=[];rH()}

function cpSol(){
  if(!lastS)return;
  navigator.clipboard.writeText(lastS).then(()=>{
    const b=document.getElementById('cpbtn');
    b.classList.add('ok');b.textContent='Copied!';
    setTimeout(()=>{b.classList.remove('ok');b.innerHTML='<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy'},2000);
  });
}
function shSol(){
  if(!lastS)return;
  navigator.clipboard.writeText('JEE Solution ('+subj+')\n\n'+lastS+'\n\n— JEE Solver by Arpit Agarwal').then(()=>showToast('Copied for sharing!'));
}

async function solve(){
  const btn=document.getElementById('sbtn');
  const card=document.getElementById('solcard');
  const body=document.getElementById('solbody');
  const dots=document.getElementById('ldots');
  let payload={subject:subj,input_type:mode},qt='';

  if(mode==='text'){
    qt=document.getElementById('qinput').value.trim();
    if(!qt){showErr('Please enter a question.');return;}
    payload.question=qt;
  } else {
    if(!iB64){showErr('Please upload an image.');return;}
    qt=document.getElementById('iq').value.trim()||'Solve this problem';
    payload.question=qt;
    payload.image_base64=iB64;
  }

  btn.disabled=true;
  btn.innerHTML='Solving...';
  card.style.display='block';
  body.style.display='none';
  dots.style.display='flex';
  document.getElementById('spill').textContent=subj;
  document.getElementById('errd').style.display='none';

  try{
    const res=await fetch(WH,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.message||'Server error');
    lastS=data.solution||'';
    dots.style.display='none';
    body.innerHTML=renderSolution(lastS);
    body.style.display='block';
    addH(qt);
    if(window.MathJax){
      MathJax.typesetPromise([body]).catch(e=>console.log('MathJax:',e));
    }
  } catch(e){
    dots.style.display='none';
    body.innerHTML='<p style="color:var(--danger-text)">'+e.message+'</p>';
    body.style.display='block';
  }

  btn.disabled=false;
  btn.innerHTML='Solve <svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:white"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
}
</script>
</body>
</html>
